
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta property="og:title" content="enfive" />
  <meta property="og:description" content="music by n5" />
  <meta property="og:url" content="https://enfive.us" />
  <title>enfive</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: #ffffff;
      color: #0a0a0a;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      transition: background 0.3s ease;
      overflow: hidden;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: 1fr auto 1fr;
      align-items: center;
    }

    /* top row: links left-aligned, spaced */
    .links-top {
      display: flex;
      gap: 32px;
      padding: 36px 48px;
      align-self: start;
    }

    /* center: name + tag */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    h1 {
      font-size: clamp(64px, 10vw, 120px);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: inherit;
      cursor: pointer;
      user-select: none;
      line-height: 1;
      transition: color 0.3s;
    }

    .tag {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: inherit;
      opacity: 0.9;
      transition: opacity 0.3s;
      cursor: pointer;
      user-select: none;
    }

    .n5 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: inherit;
      opacity: 0.9;
      margin-top: -8px;
      cursor: pointer;
      user-select: none;
    }

    /* bottom row: links right-aligned */
    .links-bottom {
      display: flex;
      gap: 32px;
      padding: 36px 48px;
      align-self: end;
      justify-content: flex-end;
    }

    a {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: inherit;
      opacity: 0.5;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    a:hover {
      opacity: 1;
    }

    @media (max-width: 560px) {
      .links-top, .links-bottom {
        padding: 24px 20px;
        gap: 20px;
        flex-wrap: wrap;
      }
      .links-bottom {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="links-top">
      <a href="https://instagram.com/enfive" target="_blank">instagram</a>
      <a href="https://tiktok.com/@enfive_n5" target="_blank">tiktok</a>
      <a href="https://twitter.com/enfive_n5" target="_blank">twitter</a>
      <a href="https://www.youtube.com/@enfive_n5" target="_blank">youtube</a>
      <a href="mailto:contact@enfive.us">contact</a>
    </div>

    <div class="center">
      <h1 id="name">enfive</h1>
      <span class="n5" id="n5">n5</span>
      <span class="tag" id="tag">&lt;5</span>
    </div>

    <div class="links-bottom">
      <a href="https://open.spotify.com/artist/4gPfp8SualHtRxwbk7vhFf?si=UxtKWd4NQT6rXgOnaqoQFw" target="_blank">spotify</a>
      <a href="https://music.apple.com/us/artist/enfive/6771592233" target="_blank">apple music</a>
      <a href="https://soundcloud.com/enfive_n5" target="_blank">soundcloud</a>
      <a href="https://enfive.bandcamp.com/music" target="_blank">bandcamp</a>
    </div>
  </div>

  <script>
    const colors = [
      '#ffffff',
      '#ff00aa',
      '#c8ff00',
      '#ff3c00',
      '#0033ff',
      '#00ffe0',
      '#7000ff',
      '#ff9500',
      '#0a0a0a',
    ];

    const lightBgs = new Set(['#c8ff00', '#ffffff', '#00ffe0', '#ff9500']);

    let index = 0;

    function cycle() {
      index = (index + 1) % colors.length;
      const bg = colors[index];
      document.body.style.background = bg;
      document.body.style.color = lightBgs.has(bg) ? '#0a0a0a' : '#ffffff';
    }

    document.getElementById('name').addEventListener('click', cycle);
    document.getElementById('n5').addEventListener('click', cycle);
    document.getElementById('tag').addEventListener('click', cycle);
  </script>

</body>
</html>
